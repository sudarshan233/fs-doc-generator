<section class="w-full border-t border-x border-slate-300 text-[#1d1d1d]">
  <div class="px-3 py-1 text-center text-sm font-bold text-gray-600 bg-slate-200">
    Details of cargo as declared by Shipper
  </div>

  <app-freight-detail
    label="Container Nos."
    [value]="containerNos"
  ></app-freight-detail>

  <app-freight-detail
    label="Type of Service"
    [value]="hbl?.movement_type ?? '—'"
  ></app-freight-detail>

  <app-freight-detail
    label="Forwarding Agent"
    [value]="forwardingAgentText"
  ></app-freight-detail>

  <div class="px-3 py-2 text-center text-sm font-bold text-gray-600 border-t border-dashed border-slate-300">
    @if (hbl?.carrier?.name) {
      As Agent for the Carrier {{ hbl?.carrier?.name }}
    } @else {
      As Agent for the Carrier
    }
  </div>

  <app-freight-verification></app-freight-verification>
</section>
